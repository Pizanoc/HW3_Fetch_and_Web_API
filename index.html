<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty Character Search</title>
    <link rel="stylesheet" href="js/styles.css">
</head>
<body>
    <header>
        <h1>Rick and Morty Character Search</h1>
        <p>Search for a character by name using the Rick and Morty API.</p>
    </header>

    <main>
        <section class="search-section">
            <form id="characterForm">
                <label for="characterName">Enter Character Name:</label>
                <input type="text" id="characterName" name="characterName" placeholder="Example: Rick" />
                <button type="submit">Search</button>
            </form>
            <p id="message"></p>
        </section>

        <section id="results" class="results-section"></section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
